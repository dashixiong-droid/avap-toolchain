; AVAP Tag 配置
; 每个 [tag] section 定义一个 tag 的打包压缩策略
; 动画节点在 Inspector 里选 tag，打包时同 tag 的素材进同一个 atlas

[default]
label = "默认"
atlas_size = 2048
fps = 30
dual_track = true
crf = 25
speed = 4

[battle]
label = "战斗"
atlas_size = 2048
fps = 30
dual_track = true
crf = 20
speed = 2

[ui]
label = "界面"
atlas_size = 1024
fps = 30
dual_track = true
crf = 30
speed = 6

[loop]
label = "循环"
atlas_size = 2048
fps = 30
dual_track = true
crf = 22
speed = 3